version: "3.8"

# Development override — runs everything on localhost without Chrome Manager
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  flowkit-backend:
    environment:
      - CHROME_MANAGER_URL=
    ports:
      - "8100:8100"
      - "9222:9222"

  flowkit-chrome:
    profiles:
      - disabled

  flowkit-ui:
    ports:
      - "3000:3000"
